{% extends "base.html" %}

{% block title %}Channels — Regulatory Alerts{% endblock %}

{% block content %}
<div class="mb-6">
    <h1 class="text-2xl font-bold text-gray-900">Notification Channels</h1>
    <p class="text-sm text-gray-500 mt-1">Manage webhook and email notification targets</p>
</div>

<div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
    <!-- Channel List (2/3 width) -->
    <div class="lg:col-span-2">
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
            <div class="px-5 py-4 border-b border-gray-200">
                <h2 class="text-lg font-semibold text-gray-900">Active Channels</h2>
            </div>
            <div id="channels-content" class="overflow-x-auto">
                {% include "partials/_channels_list.html" %}
            </div>
        </div>
    </div>

    <!-- Create Form (1/3 width) -->
    <div>
        {% include "partials/_channel_form.html" %}
    </div>
</div>
{% endblock %}
