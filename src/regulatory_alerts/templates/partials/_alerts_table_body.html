<!-- HTMX fragment: table rows + pagination (no full page wrapper) -->
<table class="w-full">
    <thead>
        <tr class="border-b border-gray-200">
            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider w-28">Date</th>
            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider w-20">Agency</th>
            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Title</th>
            <th class="px-4 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider w-20">Score</th>
            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider w-48">Topics</th>
        </tr>
    </thead>
    <tbody>
        {% for doc in docs %}
            {% include "partials/_alert_row.html" %}
        {% else %}
        <tr>
            <td colspan="5" class="px-4 py-12 text-center text-gray-400">
                <svg class="w-12 h-12 mx-auto mb-3 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                </svg>
                <p class="text-sm">No alerts found matching your filters.</p>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% if docs %}
{% include "partials/_pagination.html" %}
{% endif %}
